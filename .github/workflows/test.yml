name: Run Tests

on:
  push:
    branches: [ main, develop, test/github-actions ]
  pull_request:
    branches: [ main, develop, test/github-actions ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        
      - name: Install dependencies
        run: bun install
        
      - name: Run tests
        run: bun git-test